name: TJK Raporu

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      tarih:
        description: "Tarih YYYY-MM-DD"
        required: false
        default: ""

jobs:
  tjk-rapor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Kodu Indir
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimlilik Yukle
        run: pip install requests schedule openpyxl

      - name: Config Olustur
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          AT_SAHIPLERI:      ${{ secrets.AT_SAHIPLERI }}
          SMTP_KULLANICI:    ${{ secrets.SMTP_KULLANICI }}
          SMTP_SIFRE:        ${{ secrets.SMTP_SIFRE }}
          EMAIL_ALICILAR:    ${{ secrets.EMAIL_ALICILAR }}
        run: python -c "
import json, os
cfg = {
  'telegram_bot_token': os.environ['TELEGRAM_TOKEN'],
  'telegram_chat_ids': json.loads(os.environ['TELEGRAM_CHAT_IDS']),
  'telegram_aktif': True,
  'email_aktif': True,
  'smtp': {'sunucu': 'smtp.gmail.com', 'port': 587, 'kullanici': os.environ['SMTP_KULLANICI'], 'sifre': os.environ['SMTP_SIFRE']},
  'email_alicilar': json.loads(os.environ['EMAIL_ALICILAR']),
  'at_sahipleri': json.loads(os.environ['AT_SAHIPLERI']),
  'bildirim_saati': '21:00',
  'komisyon_yuzdesi': 5.0,
  'excel_aktif': True,
  'excel_klasor': 'raporlar',
  'log_seviyesi': 'INFO'
}
json.dump(cfg, open('config.json','w',encoding='utf-8'), ensure_ascii=False)
print('config.json olusturuldu')
print(open('config.json').read()[:200])
"

      - name: Raporu Calistir
        run: |
          TARIH="${{ github.event.inputs.tarih }}"
          if [ -n "$TARIH" ]; then
            python tjk_tracker.py --tarih "$TARIH"
          else
            python tjk_tracker.py --test
          fi

      - name: Excel Kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tjk-excel-${{ github.run_id }}
          path: raporlar/*.xlsx
          retention-days: 30
          if-no-files-found: ignore
