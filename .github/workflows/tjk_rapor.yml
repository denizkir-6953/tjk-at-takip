name: TJK Raporu

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      tarih:
        description: "Tarih YYYY-MM-DD"
        required: false
        default: ""

jobs:
  tjk-rapor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Kodu Indir
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimlilik Yukle
        run: pip install requests schedule openpyxl

      - name: Config Olustur
        run: |
          cat > config.json << JSONEOF
          {
            "telegram_bot_token": "${{ secrets.TELEGRAM_TOKEN }}",
            "telegram_chat_ids": ${{ secrets.TELEGRAM_CHAT_IDS }},
            "telegram_aktif": true,
            "email_aktif": true,
            "smtp": {
              "sunucu": "smtp.gmail.com",
              "port": 587,
              "kullanici": "${{ secrets.SMTP_KULLANICI }}",
              "sifre": "${{ secrets.SMTP_SIFRE }}"
            },
            "email_alicilar": ${{ secrets.EMAIL_ALICILAR }},
            "at_sahipleri": ${{ secrets.AT_SAHIPLERI }},
            "bildirim_saati": "21:00",
            "komisyon_yuzdesi": 5.0,
            "excel_aktif": true,
            "excel_klasor": "raporlar",
            "log_seviyesi": "INFO"
          }
          JSONEOF
          echo "config.json olusturuldu"
          cat config.json

      - name: Raporu Calistir
        run: |
          TARIH="${{ github.event.inputs.tarih }}"
          if [ -n "$TARIH" ]; then
            python tjk_tracker.py --tarih "$TARIH"
          else
            python tjk_tracker.py --test
          fi

      - name: Excel Kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tjk-excel-${{ github.run_id }}
          path: raporlar/*.xlsx
          retention-days: 30
          if-no-files-found: ignore
