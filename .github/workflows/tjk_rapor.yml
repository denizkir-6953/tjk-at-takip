name: TJK Raporu

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      tarih:
        description: "Tarih YYYY-MM-DD"
        required: false
        default: ""

jobs:
  tjk-rapor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Kodu Indir
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bagimlilik Yukle
        run: pip install requests schedule openpyxl

      - name: Config Olustur
        env:
          TG_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TG_CHATS:    ${{ secrets.TELEGRAM_CHAT_IDS }}
          AT_LIST:     ${{ secrets.AT_SAHIPLERI }}
          SMTP_USER:   ${{ secrets.SMTP_KULLANICI }}
          SMTP_PASS:   ${{ secrets.SMTP_SIFRE }}
          EMAIL_LIST:  ${{ secrets.EMAIL_ALICILAR }}
        run: |
          python3 make_config.py

      - name: Raporu Calistir
        run: |
          TARIH="${{ github.event.inputs.tarih }}"
          if [ -n "$TARIH" ]; then
            python tjk_tracker.py --tarih "$TARIH"
          else
            python tjk_tracker.py --test
          fi

      - name: Excel Kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tjk-excel-${{ github.run_id }}
          path: raporlar/*.xlsx
          retention-days: 30
          if-no-files-found: ignore
